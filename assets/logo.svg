<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A94B"/>
      <stop offset="100%" stop-color="#b8912f"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#1a1a2e"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#gd)" stroke-width="2"/>
  <!-- Car silhouette - sleek sports car profile -->
  <path d="M45,120 L55,120 L65,105 Q75,90 90,90 L130,90 Q140,90 145,100 L155,120 L160,120"
    fill="none" stroke="url(#gd)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Car body bottom -->
  <line x1="40" y1="120" x2="165" y2="120" stroke="url(#gd)" stroke-width="3" stroke-linecap="round"/>
  <!-- Wheels -->
  <circle cx="70" cy="120" r="10" fill="none" stroke="url(#gd)" stroke-width="2.5"/>
  <circle cx="70" cy="120" r="4" fill="url(#gd)"/>
  <circle cx="145" cy="120" r="10" fill="none" stroke="url(#gd)" stroke-width="2.5"/>
  <circle cx="145" cy="120" r="4" fill="url(#gd)"/>
  <!-- Shine/sparkle elements -->
  <line x1="90" y1="60" x2="90" y2="72" stroke="url(#gd)" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="55" x2="110" y2="70" stroke="url(#gd)" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="50" x2="100" y2="65" stroke="url(#gd)" stroke-width="2" stroke-linecap="round"/>
  <!-- Sparkle stars -->
  <circle cx="80" cy="65" r="2" fill="url(#gd)"/>
  <circle cx="120" cy="58" r="2" fill="url(#gd)"/>
</svg>
